name: DevOps-Normal-Model2

on:
  push:
    branches: [nidhishs91-patch-1]

permissions:
  contents: read

jobs:
  ServiceNowDevOpsChange:
    runs-on: ubuntu-latest
    name: SN-DevOps-Normal-Change

    steps:
      # -----------------------------------
      # CHECKOUT
      # -----------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------
      # CREATE STANDARD CHANGE
      # -----------------------------------
      - name: Create ServiceNow Normal Change
        id: sn_change
        uses: ServiceNow/servicenow-devops-change@v6.1.0
        with:
          devops-integration-user-name:     ${{ secrets.SN_DEVOPS_USER }}
          devops-integration-user-password: ${{ secrets.SN_DEVOPS_PASSWORD }}
          instance-url: ${{ secrets.SN_INSTANCE_URL }}
          tool-id: ${{ secrets.SN_ORCHESTRATION_TOOL_ID }}
          context-github: ${{ toJSON(github) }}
          job-name: "SN-DevOps-Normal-Change"

          change-request: >
                          {
                          "autoCloseChange": "true",
                          "attributes": {
                          "short_description": "Normal Change Test",
                          "description": "Triggered from GitHub Actions",
                          "implementation_plan": "Deploy code",
                          "backout_plan": "Rollback deployment",
                          "test_plan": "Run smoke tests",
                          "start_date": "2026-03-28 06:00:00",
                          "end_date": "2026-03-28 06:30:00"
                          }
                          }

          interval: "15"
          timeout: "900"
